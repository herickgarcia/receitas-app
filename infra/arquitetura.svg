<svg viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1000" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">
    Arquitetura CI/CD - receitas-app (VM Univates, Docker)
  </text>

  <!-- VM box -->
  <rect x="20" y="55" width="960" height="540" rx="10" fill="none" stroke="#888" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="40" y="80" font-size="14" font-weight="bold" fill="#555">VM Univates (Ubuntu) - Docker Engine</text>

  <!-- Versionamento -->
  <rect x="50" y="110" width="180" height="80" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="140" y="140" font-size="14" font-weight="bold" text-anchor="middle">Git</text>
  <text x="140" y="160" font-size="12" text-anchor="middle">Versionamento</text>
  <text x="140" y="178" font-size="11" text-anchor="middle" fill="#555">(código + migrations)</text>

  <!-- Jenkins -->
  <rect x="280" y="110" width="220" height="120" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="390" y="135" font-size="14" font-weight="bold" text-anchor="middle">Jenkins (container)</text>
  <text x="390" y="158" font-size="11" text-anchor="middle">Pipeline: build, 20 testes,</text>
  <text x="390" y="174" font-size="11" text-anchor="middle">JUnit + Jacoco, SonarQube,</text>
  <text x="390" y="190" font-size="11" text-anchor="middle">build da imagem, deploy</text>
  <text x="390" y="212" font-size="10" text-anchor="middle" fill="#888">Ambiente de Integração</text>

  <!-- SonarQube -->
  <rect x="540" y="110" width="180" height="80" rx="8" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2"/>
  <text x="630" y="140" font-size="14" font-weight="bold" text-anchor="middle">SonarQube</text>
  <text x="630" y="160" font-size="12" text-anchor="middle">Análise de qualidade</text>
  <text x="630" y="178" font-size="11" text-anchor="middle" fill="#555">de código (container)</text>

  <!-- Homologação group -->
  <rect x="50" y="260" width="430" height="160" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="265" y="285" font-size="15" font-weight="bold" text-anchor="middle" fill="#2E7D32">Ambiente de Homologação</text>

  <rect x="75" y="305" width="180" height="90" rx="6" fill="#ffffff" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="165" y="330" font-size="13" font-weight="bold" text-anchor="middle">receitas-app-homolog</text>
  <text x="165" y="350" font-size="11" text-anchor="middle">Spring Boot 3 / Java 21</text>
  <text x="165" y="367" font-size="11" text-anchor="middle">porta 8081</text>

  <rect x="280" y="305" width="180" height="90" rx="6" fill="#ffffff" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="370" y="330" font-size="13" font-weight="bold" text-anchor="middle">receitas-db-homolog</text>
  <text x="370" y="350" font-size="11" text-anchor="middle">PostgreSQL 16</text>
  <text x="370" y="367" font-size="11" text-anchor="middle">+ Flyway migrations</text>

  <!-- Produção group -->
  <rect x="520" y="260" width="430" height="160" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="735" y="285" font-size="15" font-weight="bold" text-anchor="middle" fill="#C62828">Ambiente de Produção</text>

  <rect x="545" y="305" width="180" height="90" rx="6" fill="#ffffff" stroke="#C62828" stroke-width="1.5"/>
  <text x="635" y="330" font-size="13" font-weight="bold" text-anchor="middle">receitas-app-prod</text>
  <text x="635" y="350" font-size="11" text-anchor="middle">Spring Boot 3 / Java 21</text>
  <text x="635" y="367" font-size="11" text-anchor="middle">porta 8082</text>

  <rect x="750" y="305" width="180" height="90" rx="6" fill="#ffffff" stroke="#C62828" stroke-width="1.5"/>
  <text x="840" y="330" font-size="13" font-weight="bold" text-anchor="middle">receitas-db-prod</text>
  <text x="840" y="350" font-size="11" text-anchor="middle">PostgreSQL 16</text>
  <text x="840" y="367" font-size="11" text-anchor="middle">+ Flyway migrations</text>

  <!-- Workspace local -->
  <rect x="50" y="450" width="430" height="120" rx="8" fill="#ECEFF1" stroke="#455A64" stroke-width="2"/>
  <text x="265" y="475" font-size="14" font-weight="bold" text-anchor="middle">Workspace Local (Desenvolvedor)</text>
  <text x="265" y="500" font-size="12" text-anchor="middle">Implementação do código-fonte</text>
  <text x="265" y="520" font-size="12" text-anchor="middle">(Spring Boot + Thymeleaf + Flyway)</text>
  <text x="265" y="545" font-size="11" text-anchor="middle" fill="#666">Linguagem: Java 21 | Banco: PostgreSQL 16</text>

  <!-- Browser/usuario -->
  <rect x="520" y="450" width="430" height="120" rx="8" fill="#FFFDE7" stroke="#F9A825" stroke-width="2"/>
  <text x="735" y="475" font-size="14" font-weight="bold" text-anchor="middle">Validação (Navegador)</text>
  <text x="735" y="500" font-size="12" text-anchor="middle">http://VM:8081 (Homologação)</text>
  <text x="735" y="520" font-size="12" text-anchor="middle">http://VM:8082 (Produção)</text>
  <text x="735" y="545" font-size="11" text-anchor="middle" fill="#666">Login: admin / admin123</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#555"/>
    </marker>
  </defs>

  <line x1="230" y1="150" x2="280" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="150" x2="540" y2="150" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="230" x2="265" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="230" x2="735" y2="260" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="265" y1="450" x2="140" y2="190" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
