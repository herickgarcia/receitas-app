jenkins:
  systemMessage: "Jenkins configurado automaticamente via JCasC - receitas-app"
  numExecutors: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin1234"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  sonarGlobalConfiguration:
    installations:
      - name: "sonarqube-local"
        serverUrl: "http://sonarqube:9000"
        credentialsId: "sonarqube-token"

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              secret: "squ_e639e1e3946b0b1e156c7d6eb36375b3f529e8d5"
              description: "SonarQube Token"

jobs:
  - script: >
      pipelineJob('receitas-app-pipeline') {
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/herickgarcia/receitas-app.git')
                }
                branch('*/main')
              }
            }
            scriptPath('jenkins/Jenkinsfile')
          }
        }
      }
