<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${receita.nome}">Detalhe</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; }
        td:first-child { font-weight: bold; width: 35%; background: #f0f0f0; }
        .acoes { margin-top: 1.25rem; display: flex; gap: 0.75rem; }
    </style>
</head>
<body>
    <h2 th:text="${receita.nome}">Nome</h2>

    <table>
        <tr><td>ID</td><td th:text="${receita.id}"></td></tr>
        <tr><td>Tipo</td><td th:text="${receita.tipoReceita.label}"></td></tr>
        <tr><td>Descrição</td><td th:text="${receita.descricao}"></td></tr>
        <tr><td>Custo</td><td th:text="'R$ ' + ${#numbers.formatDecimal(receita.custo, 1, 'POINT', 2, 'COMMA')}"></td></tr>
        <tr><td>Data de Registro</td><td th:text="${#temporals.format(receita.dataRegistro, 'dd/MM/yyyy')}"></td></tr>
    </table>

    <div class="acoes">
        <a th:href="@{/receitas/editar/{id}(id=${receita.id})}">
            <button>Editar</button>
        </a>
        <a th:href="@{/receitas}">
            <button>← Voltar</button>
        </a>
    </div>
</body>
</html>
